# Local development Nginx (no TLS). Proxies localhost:80 → app:8000

user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/octet-stream image/svg+xml;
    gzip_min_length 1024;

    # --- Security: generic bot/scanner hardening (dev parity) ---
    limit_req_zone $binary_remote_addr zone=req_per_ip:10m rate=10r/s;
    map $request_uri $deny_dotfiles {
        default 0;
        ~^/\.well-known/acme-challenge/ 0;
        ~^/\..+ 1;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Public paths: only "/" and assets required to render the SPA shell in dev
    # Everything else must be Basic-auth protected
    map $request_uri $basic_state {
        default "Restricted";
        ~^/$                          off;
        ~^/\?                         off;
        ~^/about$                     off;
        ~^/terms$                     off;
        ~^/member-eula               off;
        ~^/what-is-compass-score$     off;
        ~^/why-people-use-nirvana$    off;
        ~^/trust-code-programme$      off;
        # Vite dev internals and static for root to render without auth
        ~^/@vite                      off;
        ~^/@react-refresh             off;
        ~^/node_modules/              off;
        ~^/src/                       off;
        ~^/assets/                    off;
        ~^/favicon\.ico$              off;
        ~^/vite\.svg$                 off;
    }

    # Host-based API whitelist (bypass Basic for these hosts)
    map $host $api_basic_state {
        default "Restricted";
        localhost off;
        127.0.0.1 off;
    }

    upstream nirvana_backend_upstream {
        server nirvana_backend:8000;
    }
    upstream nirvana_frontend_upstream {
        server nirvana_website_dev:5173 max_fails=1 fail_timeout=2s;
    }
    upstream nirvana_assets_upstream {
        server nirvana_website_dev:5173 max_fails=1 fail_timeout=2s;
    }

    # Plain HTTP server for localhost
    server {
        listen 80 default_server;
        server_name localhost 127.0.0.1 _;

        # Real IP headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # Single API gateway to backend
        location ^~ /api/ {
            # Delegate access control to backend (it reads NIR_ALLOWED_ORIGINS)
            proxy_pass http://nirvana_backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            send_timeout 300s;
        }


        # Static files served from frontend (PDF, CSS, images, etc.)
        location /static/ {
            proxy_pass http://nirvana_frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            send_timeout 300s;
            
            # Add CORS headers for static assets
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        }

        # Handle images from EULA documents (fix for member-eula images)
        location /images/ {
            proxy_pass http://nirvana_backend_upstream/static/html/member_eula/images/;
            proxy_http_version 1.1;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            send_timeout 300s;
        }

        location /assets/ {
            proxy_pass http://nirvana_assets_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            send_timeout 300s;
        }

        # SPA page for /export (UI)
        location = /export {
            proxy_pass http://nirvana_frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        # API for /export/* → /api/export/* (append path prefix directly)
        location ^~ /export/ {
            auth_basic $api_basic_state;
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://nirvana_backend_upstream/api/export/;
            proxy_http_version 1.1;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Host $host;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            send_timeout 600s;
        }

        location /spa/ {
            proxy_pass http://nirvana_frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            send_timeout 300s;
        }

        # SPA served everywhere else
        location = / {
            proxy_pass http://nirvana_frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Block common sensitive patterns (allow node_modules for Vite dev)
        location ~* (\.env(\.[a-z]+)?|id_rsa(\.pub)?|credentials|Dockerfile|docker-compose\.ya?ml|\.git|\.svn|\.hg|terraform(\.tf(state|vars)?|/)|ansible(\.cfg|/)|pulumi|\.boto|\.ssh|\.docker|\.aws|\.azure|\.gcp|wp-admin|wp-content|wp-includes|vendor|backup|backups|logs|tmp|uploads|keys|secrets) {
            access_log off;
            return 444;
        }

        # Vite dev server internals
        location ^~ /node_modules/ {
            proxy_pass http://nirvana_frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location ^~ /@vite {
            proxy_pass http://nirvana_frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location ^~ /@react-refresh {
            proxy_pass http://nirvana_frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Block PHP
        location ~* \.php(\d+)?$ {
            access_log off;
            return 444;
        }

        # Default: serve SPA from frontend-dev (protected except for public paths via $basic_state)
        location / {
            auth_basic $basic_state;
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://nirvana_frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            send_timeout 300s;
        }
    }
}


